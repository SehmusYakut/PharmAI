name: pharmai
description: PharmAI – Medical Knowledge & Calculator App (ICD-10, Drug Info, Clinical Calculators).
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Localizations
  intl: ^0.20.2

  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^9.1.0

  # Local Database
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0 # Isar native libs for Flutter (iOS/Android)

  # Code Generation Annotations
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Dependency Injection
  get_it: ^8.0.2

  # Navigation
  go_router: ^14.3.0

  # Functional Error Handling
  fpdart: ^1.1.0

  # Value Equality
  equatable: ^2.0.7

  # File System (needed for Isar directory on device)
  path_provider: ^2.1.1
  shared_preferences: ^2.3.3

  # RFC 4180-compliant CSV parsing (handles embedded newlines in quoted fields)
  csv: ^6.0.0
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  google_sign_in: ^7.2.0
  google_generative_ai: ^0.4.7
  flutter_dotenv: ^5.1.0

dependency_overrides:
  isar_flutter_libs:
    path: packages/isar_flutter_libs

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code Generators
  build_runner: ^2.4.13
  isar_generator: ^3.1.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.13.1

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/data/icd10_codes.csv
    - assets/data/drugs_data.json
    - assets/images/
    - .env
